name: CI

on:
  push:
    branches: [main, polkadot-linter-updates]
  pull_request:
    branches: [main]

jobs:
  polkadot-linter:
    name: Validate Polkadot Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly formatter toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-06-10
          components: rustfmt

      - name: Install build and test toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo +nightly-2025-06-10 fmt --all -- --check

      - name: Run Polkadot Linter tests
        run: cargo +1.93.0 test

      - name: Build Polkadot Linter binary
        run: cargo +1.93.0 build
